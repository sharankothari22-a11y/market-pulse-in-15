# alembic.ini
# ─────────────────────────────────────────────────────────────────────────────
# Alembic configuration for research_platform database migrations.
#
# Usage:
#   alembic init database/migrations   # first-time setup
#   alembic revision --autogenerate -m "initial schema"
#   alembic upgrade head
#   alembic downgrade -1
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
# URL is overridden programmatically from config/settings.py
# so this value is a safe placeholder; never commit real credentials here.
script_location = database/migrations

# Output encoding
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
